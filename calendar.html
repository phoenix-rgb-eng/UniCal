<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniCal – Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="global.css"/>
  <style>
    .cal-layout { display:grid; grid-template-columns:1fr 280px; gap:20px; align-items:start; }
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .cal-month-title { font-family:var(--font-display); font-size:1.4rem; font-weight:300; letter-spacing:-0.02em; }
    .cal-nav-btns { display:flex; gap:6px; }
    .cal-nav-btn { width:34px; height:34px; border-radius:var(--radius-sm); background:var(--surface-2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-muted); transition:all 0.15s ease; }
    .cal-nav-btn:hover { background:var(--surface-3); color:var(--text); }
    .today-btn { padding:6px 14px; border-radius:var(--radius-sm); background:var(--surface-2); border:1.5px solid var(--border); font-size:0.78rem; font-weight:500; cursor:pointer; color:var(--text-muted); transition:all 0.15s; }
    .today-btn:hover { background:var(--surface-3); color:var(--text); }

    .cal-grid-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-day-hdr { padding:10px 4px; text-align:center; font-size:0.7rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); background:var(--surface-2); border-bottom:1px solid var(--border); }
    .cal-cell { min-height:84px; padding:6px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s ease; position:relative; }
    .cal-cell:nth-child(7n) { border-right:none; }
    .cal-cell:hover { background:var(--surface-2); }
    .cal-cell.other-month { opacity:0.35; pointer-events:none; }
    .cal-cell.is-today .cal-day-num { background:var(--text); color:var(--surface); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
    .cal-cell.selected { background:var(--surface-2); }
    .cal-day-num { font-size:0.82rem; font-weight:500; margin-bottom:4px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
    .cal-dot-row { display:flex; flex-wrap:wrap; gap:3px; }
    .cal-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    .day-panel { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); position:sticky; top:24px; }
    .day-panel-title { font-family:var(--font-display); font-size:1.1rem; font-weight:300; margin-bottom:16px; }
    .day-ev { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); animation:fadeUp 0.25s ease both; }
    .day-ev:last-child { border-bottom:none; }
    .day-ev-stripe { width:3px; height:32px; border-radius:2px; flex-shrink:0; }
    .day-ev-name { font-size:0.85rem; font-weight:500; flex:1; }
    .day-ev-meta { font-size:0.72rem; color:var(--text-muted); }

    .legend { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
    .legend-title { font-size:0.68rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:0.78rem; color:var(--text-muted); margin-bottom:5px; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    @media (max-width:860px) {
      .cal-layout { grid-template-columns:1fr; }
      .day-panel { position:static; }
      .cal-cell { min-height:60px; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation"></aside>
    <button id="navToggle" class="nav-toggle" aria-label="Open navigation menu" aria-expanded="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <main class="main-content" id="main-content">
      <header class="page-header">
        <div><h1 class="page-title"><em>Calendar</em></h1><p class="page-subtitle">See all your deadlines and tasks in one view.</p></div>
      </header>
      <div class="cal-layout">
        <div>
          <div class="cal-nav" aria-label="Calendar navigation">
            <h2 class="cal-month-title" id="calMonthTitle" aria-live="polite"></h2>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="today-btn" onclick="goToday()" aria-label="Go to today">Today</button>
              <div class="cal-nav-btns">
                <button class="cal-nav-btn" onclick="shiftMonth(-1)" aria-label="Previous month"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>
                <button class="cal-nav-btn" onclick="shiftMonth(1)"  aria-label="Next month"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></button>
              </div>
            </div>
          </div>
          <div class="cal-grid-wrap" role="grid" aria-label="Monthly calendar">
            <div class="cal-grid" role="row">
              <div class="cal-day-hdr" role="columnheader" abbr="Monday">Mon</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Tuesday">Tue</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Wednesday">Wed</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Thursday">Thu</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Friday">Fri</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Saturday">Sat</div>
              <div class="cal-day-hdr" role="columnheader" abbr="Sunday">Sun</div>
            </div>
            <div class="cal-grid" id="calCells" role="row"></div>
          </div>
        </div>
        <aside class="day-panel" aria-label="Selected day events">
          <h2 class="day-panel-title" id="dayPanelTitle"><em>Select</em> a day</h2>
          <div id="dayEvents"><div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">Click a date to see events.</div></div></div>
          <div class="legend" id="calLegend" aria-label="Course colour legend"></div>
        </aside>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script>
    requireAuth(); buildSidebar(); initMobileSidebar();
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    let viewYear=new Date().getFullYear(), viewMonth=new Date().getMonth(), selectedDate=null;

    function shiftMonth(d) { viewMonth+=d; if(viewMonth>11){viewMonth=0;viewYear++;}else if(viewMonth<0){viewMonth=11;viewYear--;} renderCal(); }
    function goToday() { const n=new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); renderCal(); }

    function renderCal() {
      document.getElementById('calMonthTitle').textContent=`${MONTHS[viewMonth]} ${viewYear}`;
      const map={};
      [...getDeadlines().filter(d=>!d.done),...getTasks().filter(t=>!t.done)].forEach(ev=>{ if(!map[ev.due])map[ev.due]=[]; map[ev.due].push(ev); });
      const firstDay=new Date(viewYear,viewMonth,1);
      let startDow=firstDay.getDay(); startDow=startDow===0?6:startDow-1;
      const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
      const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
      const todayStr=todayISO();
      const cells=document.getElementById('calCells'); cells.innerHTML='';
      const total=Math.ceil((startDow+daysInMonth)/7)*7;
      for(let i=0;i<total;i++){
        let day,month,year,isOther=false;
        if(i<startDow){day=daysInPrev-startDow+i+1;month=viewMonth-1;year=viewYear;if(month<0){month=11;year--;}isOther=true;}
        else if(i>=startDow+daysInMonth){day=i-startDow-daysInMonth+1;month=viewMonth+1;year=viewYear;if(month>11){month=0;year++;}isOther=true;}
        else{day=i-startDow+1;month=viewMonth;year=viewYear;}
        const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isToday=iso===todayStr, isSelected=iso===selectedDate, dayEvs=map[iso]||[];
        const cell=document.createElement('div');
        cell.className=`cal-cell${isOther?' other-month':''}${isToday?' is-today':''}${isSelected?' selected':''}`;
        cell.setAttribute('role','gridcell');
        cell.setAttribute('aria-label',`${day} ${MONTHS[month]} ${year}${dayEvs.length?`, ${dayEvs.length} event${dayEvs.length!==1?'s':''}`:''}`)
        if(isSelected)cell.setAttribute('aria-selected','true');
        if(!isOther)cell.onclick=()=>selectDay(iso,day,month);
        const numEl=document.createElement('div'); numEl.className='cal-day-num'; numEl.textContent=day; numEl.setAttribute('aria-hidden','true');
        cell.appendChild(numEl);
        if(dayEvs.length){const dr=document.createElement('div');dr.className='cal-dot-row';dr.setAttribute('aria-hidden','true');dayEvs.slice(0,6).forEach(ev=>{const c=courseById(ev.course);const dot=document.createElement('div');dot.className='cal-dot';dot.style.background=c.bg;dr.appendChild(dot);});cell.appendChild(dr);}
        cells.appendChild(cell);
      }
      renderLegend();
    }

    function selectDay(iso,day,month){
      selectedDate=iso; renderCal();
      document.getElementById('dayPanelTitle').innerHTML=`${day} <em>${MONTHS[month]}</em>`;
      const all=[...getDeadlines().filter(d=>!d.done&&d.due===iso),...getTasks().filter(t=>!t.done&&t.due===iso)];
      const ev=document.getElementById('dayEvents'); ev.innerHTML='';
      if(!all.length){ev.innerHTML=`<div class="empty-state"><div class="empty-state-icon">✨</div><div class="empty-state-text">Nothing due — free day!</div></div>`;return;}
      all.forEach((item,i)=>{const c=courseById(item.course);const type=item.hasOwnProperty('desc')?'Task':'Deadline';const el=document.createElement('div');el.className='day-ev';el.style.animationDelay=`${i*.05}s`;el.innerHTML=`<div class="day-ev-stripe" style="background:${c.bg}" aria-hidden="true"></div><div style="flex:1;min-width:0"><div class="day-ev-name">${item.title}</div><div class="day-ev-meta">${c.label} · ${type}</div></div><span class="badge badge-${item.priority}">${item.priority}</span>`;ev.appendChild(el);});
    }

    function renderLegend(){
      document.getElementById('calLegend').innerHTML=`<div class="legend-title">Courses</div>`+
        getCourses().map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${c.bg}" aria-hidden="true"></div>${c.label}</div>`).join('');
    }

    renderCal();
  </script>
</body>
</html>
