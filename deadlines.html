<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniCal – Deadlines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="global.css"/>
  <style>
    .dl-list { display:flex; flex-direction:column; gap:10px; }
    .dl-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px 18px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-sm); animation:fadeUp 0.35s ease both; transition:box-shadow 0.15s,transform 0.15s; }
    .dl-card:hover { box-shadow:var(--shadow); transform:translateY(-1px); }
    .dl-card.done { opacity:0.55; }
    .dl-card.done .dl-title { text-decoration:line-through; }
    .dl-stripe { width:4px; align-self:stretch; border-radius:2px; flex-shrink:0; min-height:48px; }
    .dl-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border-med); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s ease; background:transparent; }
    .dl-check:hover { border-color:var(--medium); }
    .dl-card.done .dl-check { background:var(--medium); border-color:var(--medium); }
    .dl-body { flex:1; min-width:0; }
    .dl-title { font-size:0.95rem; font-weight:500; margin-bottom:5px; }
    .dl-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .dl-date { font-size:0.78rem; color:var(--text-muted); }
    .dl-actions { display:flex; gap:6px; flex-shrink:0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation"></aside>
    <button id="navToggle" class="nav-toggle" aria-label="Open navigation menu" aria-expanded="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <main class="main-content" id="main-content">
      <header class="page-header">
        <div><h1 class="page-title"><em>Deadlines</em></h1><p class="page-subtitle" id="dlSubtitle">Loading…</p></div>
        <button class="btn btn-primary" onclick="openAdd()" aria-label="Add new deadline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add deadline
        </button>
      </header>

      <div class="chip-row" role="group" aria-label="Filter deadlines by priority">
        <button class="chip active" onclick="setFilter('all',this)" aria-pressed="true">All</button>
        <button class="chip" onclick="setFilter('urgent',this)" aria-pressed="false">Urgent</button>
        <button class="chip" onclick="setFilter('high',this)" aria-pressed="false">High</button>
        <button class="chip" onclick="setFilter('medium',this)" aria-pressed="false">Medium</button>
        <button class="chip" onclick="setFilter('low',this)" aria-pressed="false">Low</button>
        <button class="chip" onclick="setFilter('done',this)" aria-pressed="false">Completed</button>
      </div>

      <div id="dlList" class="dl-list" aria-label="Deadlines list" aria-live="polite"></div>
    </main>
  </div>

  <div class="modal-overlay" id="dlModal" role="dialog" aria-modal="true" aria-labelledby="dlModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="dlModalTitle">Add <em>deadline</em></h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close dialog">×</button>
      </div>
      <div class="field-group"><label class="field-label" for="dl-title">Title *</label><input class="field-input" id="dl-title" type="text" placeholder="e.g. Research essay" required aria-required="true"/></div>
      <div class="field-group"><label class="field-label" for="dl-course">Course *</label><select class="field-select" id="dl-course" required aria-required="true"></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field-group"><label class="field-label" for="dl-due">Due date *</label><input class="field-input" id="dl-due" type="date" required aria-required="true"/></div>
        <div class="field-group"><label class="field-label" for="dl-priority">Priority</label>
          <select class="field-select" id="dl-priority"><option value="urgent">Urgent</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
        </div>
      </div>
      <div class="field-group"><label class="field-label" for="dl-notes">Notes (optional)</label><textarea class="field-textarea" id="dl-notes" placeholder="Any extra details…" rows="2"></textarea></div>
      <div class="form-error" id="dl-error" role="alert" aria-live="polite"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveDL()">Save deadline</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="sidebar.js"></script>
  <script>
    requireAuth(); buildSidebar(); initMobileSidebar();
    let currentFilter='all', editingId=null;

    function setFilter(f,btn){
      currentFilter=f;
      document.querySelectorAll('.chip').forEach(c=>{c.classList.remove('active');c.setAttribute('aria-pressed','false');});
      btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
      renderDL();
    }

    function renderDL(){
      const all=getDeadlines();
      let items=currentFilter==='done'?all.filter(d=>d.done):currentFilter==='all'?all.filter(d=>!d.done):all.filter(d=>!d.done&&d.priority===currentFilter);
      items.sort((a,b)=>a.due.localeCompare(b.due));
      const pending=all.filter(d=>!d.done).length;
      document.getElementById('dlSubtitle').textContent=`${pending} pending deadline${pending!==1?'s':''} · ${all.filter(d=>d.done).length} completed`;
      const list=document.getElementById('dlList'); list.innerHTML='';
      if(!items.length){list.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-text">No deadlines here yet.<br>Add one to get started.</div></div>`;return;}
      items.forEach((dl,i)=>{
        const c=courseById(dl.course), days=daysUntil(dl.due);
        let urgencyLabel=days<0?'Overdue':days===0?'Today':`${days}d left`;
        let urgencyColor=days<0?'var(--urgent)':days<=3?'var(--high)':'var(--text-muted)';
        const card=document.createElement('article');
        card.className=`dl-card${dl.done?' done':''}`;
        card.style.animationDelay=`${i*.05}s`;
        card.setAttribute('aria-label',`${dl.title}, ${dl.done?'completed':'pending'}, due ${fmtDate(dl.due)}`);
        card.innerHTML=`
          <div class="dl-stripe" style="background:${c.bg}" aria-hidden="true"></div>
          <button class="dl-check" onclick="toggleDL(${dl.id})" aria-label="${dl.done?'Mark as pending':'Mark as done'}: ${dl.title}">
            ${dl.done?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`:''}
          </button>
          <div class="dl-body">
            <div class="dl-title">${dl.title}</div>
            <div class="dl-meta">
              <span class="badge" style="background:${c.bg}33;color:${c.dark}">${c.label}</span>
              <span class="badge badge-${dl.priority}">${dl.priority}</span>
              <span class="dl-date">${fmtDate(dl.due)}</span>
              ${!dl.done?`<span class="dl-date" style="color:${urgencyColor};font-weight:600">${urgencyLabel}</span>`:''}
            </div>
            ${dl.notes?`<div class="dl-date" style="margin-top:4px">${dl.notes}</div>`:''}
          </div>
          <div class="dl-actions">
            <button class="btn-icon" onclick="editDL(${dl.id})" aria-label="Edit ${dl.title}" title="Edit"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>
            <button class="btn-icon" onclick="deleteDL(${dl.id})" aria-label="Delete ${dl.title}" title="Delete"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
          </div>`;
        list.appendChild(card);
      });
    }

    function toggleDL(id){const dls=getDeadlines(),dl=dls.find(d=>d.id===id);if(dl){dl.done=!dl.done;saveDeadlines(dls);renderDL();showToast(dl.done?'Marked as done!':'Marked as pending');}}
    function deleteDL(id){if(!confirm('Delete this deadline?'))return;saveDeadlines(getDeadlines().filter(d=>d.id!==id));renderDL();showToast('Deadline deleted','info');}
    function editDL(id){const dl=getDeadlines().find(d=>d.id===id);if(!dl)return;editingId=id;populateCourseSelect();document.getElementById('dl-title').value=dl.title;document.getElementById('dl-course').value=dl.course;document.getElementById('dl-due').value=dl.due;document.getElementById('dl-priority').value=dl.priority;document.getElementById('dl-notes').value=dl.notes||'';document.getElementById('dlModalTitle').innerHTML='Edit <em>deadline</em>';document.getElementById('dlModal').classList.add('open');}
    function openAdd(){editingId=null;populateCourseSelect();['dl-title','dl-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('dl-due').value='';document.getElementById('dl-priority').value='medium';document.getElementById('dl-error').textContent='';document.getElementById('dlModalTitle').innerHTML='Add <em>deadline</em>';document.getElementById('dlModal').classList.add('open');setTimeout(()=>document.getElementById('dl-title').focus(),100);}
    function closeModal(){document.getElementById('dlModal').classList.remove('open');}
    function populateCourseSelect(){const sel=document.getElementById('dl-course');sel.innerHTML='';getCourses().forEach(c=>{const opt=document.createElement('option');opt.value=c.id;opt.textContent=c.label;sel.appendChild(opt);});}
    function saveDL(){
      const errEl=document.getElementById('dl-error');errEl.textContent='';
      const title=document.getElementById('dl-title').value.trim(),course=document.getElementById('dl-course').value,due=document.getElementById('dl-due').value,priority=document.getElementById('dl-priority').value,notes=document.getElementById('dl-notes').value.trim();
      if(!title){errEl.textContent='Please enter a title.';return;}if(!due){errEl.textContent='Please pick a due date.';return;}
      const dls=getDeadlines();
      if(editingId){const dl=dls.find(d=>d.id===editingId);if(dl)Object.assign(dl,{title,course,due,priority,notes});}
      else dls.push({id:nextId(dls),title,course,due,priority,notes,done:false});
      saveDeadlines(dls);closeModal();renderDL();showToast(editingId?'Deadline updated':'Deadline added ✓');
    }
    document.getElementById('dlModal').addEventListener('click',e=>{if(e.target===document.getElementById('dlModal'))closeModal();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
    renderDL();
  </script>
</body>
</html>
